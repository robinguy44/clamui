name: Build Flatpak

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
  workflow_call:

# TODO: Remove once flatpak/flatpak-github-actions releases a Node 24 tag (>v6.6)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-flatpak:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flathub/io.github.linx_systems.ClamUI.local.yml
          bundle: clamui-${{ matrix.arch }}.flatpak
          arch: ${{ matrix.arch }}
          cache-key: flatpak-builder-${{ matrix.runner }}-${{ matrix.arch }}

      - name: Upload Flatpak bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: flatpak-bundle-${{ matrix.arch }}
          path: clamui-${{ matrix.arch }}.flatpak
          retention-days: 7
