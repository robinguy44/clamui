name: Deploy website

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
      - "screenshots/**"
      - "icons/**"
  release:
    types: [published]
  schedule:
    # Weekly rebuild so the latest-release tag in the nav stays current
    # even if nothing else changed.
    - cron: "0 4 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: website
        env:
          # Lifts the GitHub API rate limit for the build-time
          # latest-release fetch. Token has read-only repo scope.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
